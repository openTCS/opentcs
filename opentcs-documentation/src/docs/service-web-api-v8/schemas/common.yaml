components:
  schemas:
    Property:
      type: object
      additionalProperties: false
      properties:
        key:
          type: string
          description: The property's key
          example: key1
        value:
          type: string
          description: The property's value
          example: value1
      required:
        - key
        - value
    BoundingBox:
      type: object
      additionalProperties: false
      properties:
        length:
          type: integer
          format: int64
          description: The bounding box length
          example: 60
        width:
          type: integer
          format: int64
          description: The bounding box width
          example: 40
        height:
          type: integer
          format: int64
          description: The bounding box height
          example: 50
        referenceOffset:
          $ref: "#/components/schemas/PlantModelCouple"
      required:
        - length
        - width
        - height
        - referenceOffset
    PeripheralOperation:
      title: Peripheral Operation
      description: An operation that is to be executed by a peripheral device.
      type: object
      additionalProperties: false
      properties:
        operation:
          type: string
          description: The operation to be performed by the peripheral device.
          example: Open door
        locationName:
          type: string
          description: The name of the location the peripheral device is associated with.
          example: Loading Bay
        executionTrigger:
          type: string
          description: The moment at which this operation is to be performed.
          enum:
            - AFTER_ALLOCATION
            - AFTER_MOVEMENT
            - IMMEDIATE
          default: IMMEDIATE
        completionRequired:
          type: boolean
          description: Whether the completion of this operation is required to allow a vehicle to continue driving.
          default: false
      required:
        - operation
        - locationName
    PlantModelCouple:
      title: Couple
      type: object
      properties:
        x:
          type: integer
          format: int64
          description: The Couple's x value.
          example: 1500
        y:
          type: integer
          format: int64
          description: The Couple's y value.
          example: 2000
      required:
        - x
        - y
