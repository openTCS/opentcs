paths:
  /blocks:
    get:
      tags:
        - Plant Models
      summary: Retrieves a set of blocks.
      parameters:
        - name: names
          in: query
          description: >-
            The names of the blocks to be retrieved.
            If a named block could not be found, it will simply be omitted from the response (and not result in an error).
          required: false
          schema:
            type: array
            items:
              type: string
          example: ['Block-0001', 'Block-0002']
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas/objects-states/block.yaml#/components/schemas/Block'
              examples:
                blocks:
                  $ref: '../examples/response-examples.yaml#/components/examples/blocksExample'
  "/blocks/{NAME}":
    get:
      tags:
        - Plant Models
      summary: Retrieves the block with the given name.
      parameters:
        - name: NAME
          in: path
          description: The name of the block to be retrieved.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '../schemas/objects-states/block.yaml#/components/schemas/Block'
        "404":
          description: Referencing object that could not be found.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  description: Details on the actual error.
                  example: Could not find block 'Block-0001'.
