#
# This file configures roles and users for the openTCS web API.

# To define a role, specify a role name and one or more permissions:
#
# role.<rolename> = <permission1>, <permission2>, ...
#
# Permissions can be any of the following:
#
# - READ_DATA
# - LOAD_MODEL
# - LOCK_RESOURCE
# - UPDATE_ROUTING_TOPOLOGY
# - MODIFY_VEHICLE
# - MODIFY_ORDER
# - MODIFY_ORDER_SEQUENCE
# - MODIFY_PERIPHERAL
# - MODIFY_PERIPHERAL_JOB
# - MODIFY_ENVIRONMENTAL_ENTITY
# - SHUTDOWN_KERNEL
#
# You can also use the wildcard '*' to grant all permissions to a role.
#
# For example, to define a role "admin" with all permissions, you would add the following line:
#
# role.admin = *
#
# To define a role "operator" with specific permissions, you would add the following line:
#
# role.operator = READ_DATA, MODIFY_ORDER, MODIFY_VEHICLE
#
# To define a user, specify a username, password, and optionally one or more roles:
#
# user.<username> = <password>, <role1>, <role2>, ...
#
# For example, to define a user "alice" with password "secret" and roles "admin" and "operator", you would add the following line:
#
# user.alice = secret, admin, operator

# Example entry:
#role.observer = READ_DATA
#user.observer1 = mypassword, observer
