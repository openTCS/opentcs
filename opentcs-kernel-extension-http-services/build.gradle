plugins {
  alias(libs.plugins.freefair.lombok)
}

lombok {
  version = "1.18.42"
}

apply from: "${rootDir}/gradle/java-project.gradle"
apply from: "${rootDir}/gradle/java-codequality.gradle"
apply from: "${rootDir}/gradle/guice-project.gradle"
apply from: "${rootDir}/gradle/publishing-java.gradle"

dependencies {
  api project(':opentcs-api-injection')
  api project(':opentcs-common')

  api libs.javalin
  api libs.javalin.ssl.plugin

  api libs.jakarta.servlet

  api(variantOf(libs.shiro.core) { classifier("jakarta") })
  api(variantOf(libs.shiro.web) { classifier("jakarta") })

  api libs.jackson.databind
  api libs.jackson.module.jsonSchema
  api libs.jackson.datatype.jsr310

  api libs.modelmapper
}

tasks.register('release') {
  dependsOn build
}
